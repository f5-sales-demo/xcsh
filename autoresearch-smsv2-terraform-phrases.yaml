  - id: "9a"
    option_group: s2s_slo
    option_field: no_s2s_connectivity_slo
    resource_name: ar-test-smsv2-9a
    phrase: "Write Terraform HCL for xcsh_securemesh_site_v2 named ar-test-smsv2-9a in system namespace using Azure not_managed provider with no site-to-site connectivity on SLO"
