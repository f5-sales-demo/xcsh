  # ── Group 11: url_categorization ──────────────────────────────────────────
  - id: "11a"
    option_group: url_categorization
    option_field: disable_url_categorization
    resource_name: ar-test-smsv2-11a
    phrase: "Write Terraform HCL for xcsh_securemesh_site_v2 named ar-test-smsv2-11a in system namespace using Azure not_managed provider with URL categorization disabled"
