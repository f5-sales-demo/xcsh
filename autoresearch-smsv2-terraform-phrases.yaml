    resource_name: ar-test-smsv2-9b
    phrase: "Write Terraform HCL for xcsh_securemesh_site_v2 named ar-test-smsv2-9b in system namespace using Azure not_managed provider with DC cluster group ar-test-smsv2-dcg from system namespace on SLO"
    prerequisites:
      - type: dc_cluster_group
        tf_resource: xcsh_dc_cluster_group
        name: ar-test-smsv2-dcg
        namespace: system

  - id: "10"
    option_group: s2s_slo_mesh
    option_field: site_mesh_group_on_slo
    resource_name: ar-test-smsv2-10
    phrase: "Write Terraform HCL for xcsh_securemesh_site_v2 named ar-test-smsv2-10 in system namespace using Azure not_managed provider with site mesh group ar-test-smsv2-smg from system namespace on SLO"
    prerequisites:
